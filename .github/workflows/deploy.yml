name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Automatically caches PIP wheels keyed on your configuration files
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      # Restores mypy's incremental execution cache so it only type-checks modified files
      - name: Restore Mypy Cache
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: ${{ runner.os }}-mypy-${{ hashFiles('pyproject.toml', 'src/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-mypy-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Linter (Ruff)
        run: ruff check src/

      - name: Run Static Type Checker (Mypy)
        run: mypy src/

      - name: Run Test Suite (Pytest)
        run: pytest -v